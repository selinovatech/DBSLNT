<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-slate-900 text-white p-3 flex items-center justify-between sticky top-0 z-50">
        <div class="text-2xl font-bold px-4">MY-ASSETS</div>
        <div class="flex-1 max-w-2xl mx-4">
            <div class="flex">
                <input type="text" class="w-full p-2 text-black rounded-l" placeholder="Suche nach HTML, Videos, Blueprints...">
                <button class="bg-orange-400 p-2 px-6 rounded-r hover:bg-orange-500 text-black">🔍</button>
            </div>
        </div>
        <div class="px-4 text-sm">Hallo, User <br><b>Konto & Listen</b></div>
    </header>

    <div class="flex">
        <aside class="w-64 p-6 hidden md:block bg-white h-screen sticky top-16">
            <h3 class="font-bold mb-4">Kategorien</h3>
            <ul class="space-y-2 text-sm text-gray-700">
                <li class="hover:text-orange-600 cursor-pointer">Alle anzeigen</li>
                <li class="hover:text-orange-600 cursor-pointer">HTML Templates</li>
                <li class="hover:text-orange-600 cursor-pointer">Video Material HALLO CHRIS</li>
                <li class="hover:text-orange-600 cursor-pointer">Blueprints</li>
            </ul>
        </aside>

        <main class="flex-1 p-6">
            <h2 class="text-xl font-bold mb-4">Ergebnisse für "Alle Assets"</h2>
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
        </main>
    </div>

    <script>
        // Simulierter Fetch der JSON Daten
        const data = [
            { "id": "1", "title": "Premium Dashboard UI", "category": "HTML/CSS", "price": "Gratis", "thumbnail": "https://via.placeholder.com/300x200" },
            { "id": "2", "title": "E-Commerce Card System", "category": "UI Kit", "price": "€12.00", "thumbnail": "https://via.placeholder.com/300x200" }
        ];

        const grid = document.getElementById('product-grid');

        data.forEach(item => {
            grid.innerHTML += `
                <div onclick="window.location.href='details.html?id=${item.id}'" class="bg-white border hover:shadow-xl transition cursor-pointer p-4 flex flex-col">
                    <img src="${item.thumbnail}" class="w-full h-48 object-cover mb-4">
                    <h3 class="font-semibold text-blue-600 hover:underline">${item.title}</h3>
                    <p class="text-xs text-gray-500 mb-2">${item.category}</p>
                    <div class="mt-auto">
                        <span class="text-lg font-bold">${item.price}</span>
                        <p class="text-xs text-green-600">Sofort verfügbar</p>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
